<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercises | Riwin Portfolio</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #1f242d;
        color: #ffffff;
        margin: 0;
        font-family: "Poppins", sans-serif;
      }
      header {
        background-color: #000000;
        border-bottom: 2px solid #7cf03d;
        padding: 1rem 0;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
      }
      .container {
        max-width: 1200px;
        margin: auto;
        padding: 0 20px;
      }
      .logo {
        color: #7cf03d;
        font-weight: bold;
        text-decoration: none;
        font-size: 1.5rem;
      }
      h1 {
        color: #7cf03d;
        text-align: center;
        text-transform: uppercase;
        margin-top: 120px;
      }

      /* Grid Layout */
      .exercise-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        margin-top: 30px;
      }

      /* Card Style */
      .exercise-item {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        border: 1px solid #333;
        transition: 0.3s;
        cursor: pointer;
      }
      .exercise-item:hover {
        border-color: #7cf03d;
        transform: translateY(-10px);
      }
      .exercise-item img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      /* Modal Style */
      .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        overflow-y: auto;
      }
      .modal-content {
        background-color: #1e1e1e;
        margin: 5% auto;
        padding: 30px;
        border: 2px solid #7cf03d;
        width: 80%;
        max-width: 700px;
        border-radius: 20px;
        text-align: center;
        position: relative;
      }
      .modal-content img {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 20px;
        border: 1px solid #444;
      }
      /* เพิ่ม white-space เพื่อให้การเว้นบรรทัดใน text แสดงผลถูกต้อง */
      #modalText {
        line-height: 1.6;
        color: #ccc;
        white-space: pre-line;
        text-align: left;
      }

      /* เพิ่มสไตล์ให้ลิงก์ภายใน Modal เป็นสีเดียวกับธีม */
      #modalText a {
        color: #7cf03d;
        text-decoration: none;
        font-weight: bold;
      }
      #modalText a:hover {
        text-decoration: underline;
      }

      .close-btn {
        color: #fff;
        font-size: 30px;
        font-weight: bold;
        position: absolute;
        right: 20px;
        top: 10px;
        cursor: pointer;
      }
      .close-btn:hover {
        color: #7cf03d;
      }

      /* Home Button Style */
      .btn-home {
        display: inline-block;
        background-color: #7cf03d;
        color: white;
        padding: 15px 60px;
        text-decoration: none;
        border-radius: 50px;
        font-weight: bold;
        text-transform: uppercase;
        margin: 50px 0;
        transition: 0.4s;
        border: 2px solid #7cf03d;
        cursor: pointer; /* เพิ่ม cursor pointer */
      }
      .btn-home:hover {
        background-color: transparent;
        color: #7cf03d;
      }

      footer {
        text-align: center;
        padding: 20px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <header>
      <nav
        class="container"
        style="display: flex; justify-content: center; align-items: center"
      >
        <a href="index.html" class="logo">Riwin Onsawai</a>
      </nav>
    </header>

    <div class="container">
      <h1>My Exercises</h1>
      <p style="text-align: center; color: #888">
        คลิกที่แต่ละข้อเพื่อดูรายละเอียด
      </p>

      <div class="exercise-grid">
        <script>
          // หมายเหตุ: ตรงนี้ใช้รูป mm.png เป็นภาพหน้าปก หากไม่มีไฟล์นี้รูปจะแตก
          // คุณอาจจะเปลี่ยนเป็น ex${i}.png หรือ placeholder ได้
          for (let i = 1; i <= 8; i++) {
            document.write(`
                        <div class="exercise-item" onclick="openModal(${i})">
                            <img src="mm.png" alt="Ex ${i}">
                            <h3>${i < 10 ? "0" + i : i}. Exercise</h3>
                            <p>คลิกเพื่ออ่านเพิ่มเติม</p>
                        </div>
                    `);
          }
        </script>
      </div>

      <div style="text-align: center">
        <a href="index.html" class="btn-home">HOME</a>
      </div>
    </div>

    <div id="exerciseModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img
          id="modalImg"
          src=""
          alt="Detail Image"
          style="max-height: 400px; object-fit: contain"
        />
        <h2 id="modalTitle" style="color: #7cf03d"></h2>
        <p id="modalText"></p>
        <button
          class="btn-home"
          style="margin: 20px 0 0 0; padding: 10px 30px"
          onclick="closeModal()"
        >
          CLOSE
        </button>
      </div>
    </div>

    <footer><p>BRIGHT &copy; 2026</p></footer>

    <script>
      const details = {
        1: {

          text: `สร้างหน้าแสดงสินค้าและฟอร์มสั่งซื้อ
ในโจทย์นี้จะให้คุณสร้างหน้าเว็บ HTML สำหรับแสดงข้อมูลสินค้าและฟอร์มสำหรับสั่งซื้อสินค้า โดยเน้นการใช้ Semantic HTML5 เพื่อโครงสร้างที่ดีและเข้าใจง่าย

สิ่งที่โจทย์ต้องการ:
- สร้างโครงสร้างหน้าเว็บโดยใช้ Semantic HTML5: header, nav, main, และ footer

- ภายในส่วน nav ให้สร้างเมนูนำทางที่มีลิงก์ปลอมอย่างน้อย 3 ลิงก์
- ภายในส่วน main ให้แบ่งเป็นสองส่วนหลัก: ส่วนแสดงรายละเอียดสินค้า และส่วนฟอร์มสั่งซื้อสินค้า
- สำหรับส่วนฟอร์มสั่งซื้อสินค้า: ใช้แท็ก form ที่มีช่องรับข้อมูล (ชื่อ, อีเมล, จำนวน, ข้อความ)
<a href="https://docs.google.com/document/d/1ylUQBZqkgctqJxcB-zTm8mscC2vZp87aIN6Mxk0tick/edit?tab=t.0" target="_blank">ไปยัง Google</a>`,
          img: "ex1.png",
        },
        2: {
          title: "CSS Beginner",
          text: `สร้างหน้าเว็บโปรไฟล์ส่วนตัวเชิงความหมายด้วย HTML
คุณได้รับมอบหมายให้สร้างหน้าเว็บโปรไฟล์ส่วนตัวโดยใช้ HTML ที่เน้นการใช้ Semantic HTML ให้ถูกต้อง

- ใช้แท็ก <main> สำหรับเนื้อหาหลักทั้งหมดของหน้า
- ภายใน <main> ให้มีแท็ก <section> อย่างน้อย 3 ส่วน: "เกี่ยวกับฉัน", "ทักษะ", "ประสบการณ์"
- ใช้แท็ก <form> สำหรับส่วน "ติดต่อ"
- ใช้แท็ก <footer> สำหรับส่วนท้ายของหน้าเว็บ
 <a href="https://docs.google.com/document/d/1ylUQBZqkgctqJxcB-zTm8mscC2vZp87aIN6Mxk0tick/edit?tab=t.oeegpibi2s1" target="_blank">ไปยัง Google</a>`,
          img: "ex2.png",
        },
        3: {

          text: `สร้างหน้าแสดงรายการสินค้าด้วย HTML

สิ่งที่โจทย์ต้องการ:
- ใช้แท็ก Semantic HTML (เช่น <header>, <main>, <article>) เพื่อจัดโครงสร้างหน้าเว็บ
- ต้องมีส่วนหัว (Header) ที่แสดงชื่อและตำแหน่งของผู้ใช้
- ต้องมีส่วนรูปภาพโปรไฟล์ โดยใช้แท็ก <img> พร้อมกับ alt attribute ที่เหมาะสม
- ต้องมีส่วนข้อมูลติดต่อ (Contact Info) ที่รวมถึงอีเมล, เบอร์โทรศัพท์
<a href="https://docs.google.com/document/d/1ylUQBZqkgctqJxcB-zTm8mscC2vZp87aIN6Mxk0tick/edit?tab=t.jzqwkqyzg0t6" target="_blank">ไปยัง Google</a>`,
          img: "ex3.png",
        },
        4: {
          title: "ReactJS Intermediate",
          text: `สร้างหน้าโปรไฟล์ส่วนตัวแบบเชิงโครงสร้างและ Responsive
คุณได้รับมอบหมายให้สร้างหน้าโปรไฟล์ส่วนตัวโดยใช้ HTML เพียงอย่างเดียว โดยเน้นที่การจัดโครงสร้างเนื้อหาให้ถูกต้องตามหลัก Semantic HTML

สิ่งที่โจทย์ต้องการ:
- ใช้แท็ก Semantic HTML (เช่น <header>, <main>, <section>, <footer>)
- ต้องมีส่วนหัว (Header) ที่แสดงชื่อและตำแหน่งของผู้ใช้
- ต้องมีส่วนรูปภาพโปรไฟล์ โดยใช้แท็ก <img>
- ต้องมีส่วนข้อมูลติดต่อ (Contact Info)
<a href="https://docs.google.com/document/d/1ylUQBZqkgctqJxcB-zTm8mscC2vZp87aIN6Mxk0tick/edit?tab=t.hkb8mrbl6res" target="_blank">ไปยัง Google</a>`,
          img: "ex4.png",
        },
        5: {
          title: "HTML Intermediate",
          text: `สร้างโครงสร้างบล็อกโพสต์ด้วย HTML5 Semantic
คุณได้รับมอบหมายให้สร้างโครงสร้างพื้นฐานสำหรับหน้าบล็อกโพสต์หนึ่งหน้า โดยใช้ HTML5 Semantic Elements

สิ่งที่โจทย์ต้องการ:
- สร้างแท็ก '<main>' เพื่อครอบคลุมเนื้อหาหลักทั้งหมดของหน้า
- ภายใน '<main>' ให้สร้างแท็ก '<article>' สำหรับเนื้อหาบล็อกโพสต์หลักหนึ่งโพสต์
- สร้างแท็ก '<footer>' สำหรับส่วนท้ายของหน้า โดยมีข้อมูลลิขสิทธิ์
 <a href="https://docs.google.com/document/d/1ylUQBZqkgctqJxcB-zTm8mscC2vZp87aIN6Mxk0tick/edit?tab=t.hdtgjggcflh4" target="_blank">ไปยัง Google</a>`,
          img: "ex5.png",
        },
        6: {
          title: "HTML Intermediate",
          text: `สร้างหน้าโปรไฟล์ผู้ใช้แบบ Responsive (เฉพาะโครงสร้าง HTML)
คุณได้รับมอบหมายให้สร้างโครงสร้าง HTML สำหรับหน้าโปรไฟล์ผู้ใช้ โดยเน้นที่การจัดโครงสร้างเนื้อหาให้เหมาะสม

สิ่งที่โจทย์ต้องการ:
- สร้างโครงสร้างหลักของหน้าด้วยแท็ก '<header>', '<main>' และ '<footer>'
- ในส่วน 'ทักษะ' ให้ใช้รายการแบบไม่เรียงลำดับ ('<ul>', '<li>') เพื่อแสดงทักษะต่างๆ
- ภายใน '<footer>' ให้มีข้อมูลลิขสิทธิ์และลิงก์ไปยังหน้าติดต่อเรา
 <a href="https://docs.google.com/document/d/1ylUQBZqkgctqJxcB-zTm8mscC2vZp87aIN6Mxk0tick/edit?tab=t.g7b1z5fi4ge8" target="_blank">ไปยัง Google</a>`,
          img: "ex6.png",
        },
        7: {
          title: "Javascript Intermediate",
          text: `สร้างหน้า Landing Page สำหรับงานสัมมนาเทคโนโลยี
คุณได้รับมอบหมายให้สร้างหน้า Landing Page สำหรับงานสัมมนาเทคโนโลยี 'Tech Innovators Summit 2024'

สิ่งที่โจทย์ต้องการ:
- ต้องมีส่วนแสดงข้อมูลหลักของงาน (Hero section)
- มีส่วน 'เกี่ยวกับงาน' ที่อธิบายรายละเอียดของงาน
- มีส่วน 'กำหนดการ' ที่ใช้รายการแสดงช่วงเวลา
- มีส่วน 'วิทยากร' โดยแสดงข้อมูลวิทยากรแต่ละท่าน (อาจใช้ article หรือ div)
<a href="https://docs.google.com/document/d/1ylUQBZqkgctqJxcB-zTm8mscC2vZp87aIN6Mxk0tick/edit?tab=t.nm9v3deisvgs" target="_blank">ไปยัง Google</a>`,
          img: "ex7.png",
        },
        8: {
          title: "ReactJS Intermediate",
          text: `หน้าแสดงรายการสินค้า
คุณได้รับมอบหมายให้สร้างหน้าเว็บ HTML สำหรับแสดงรายการสินค้าต่างๆ หน้าเว็บควรแสดงข้อมูลสินค้าแต่ละชิ้น

สิ่งที่โจทย์ต้องการ:
- ใช้แท็ก HTML ที่เหมาะสมและมีความหมาย (semantic HTML) เช่น '<header>', '<nav>', '<main>', '<section>'
- มีส่วนหัว (header) ที่ประกอบด้วยชื่อร้านค้าและเมนูนำทาง
- มีส่วนหลัก (main content) ที่แสดงรายการสินค้าอย่างน้อย 3 ชิ้น
- มีส่วนท้าย (footer) ที่แสดงข้อมูลลิขสิทธิ์
<a href="https://docs.google.com/document/d/1ylUQBZqkgctqJxcB-zTm8mscC2vZp87aIN6Mxk0tick/edit?tab=t.3kwdvgvnqm3n" target="_blank">ไปยัง Google</a>`,
          img: "ex8.png",
        },
      };

      function openModal(id) {
        document.getElementById("exerciseModal").style.display = "block";
        document.getElementById("modalTitle").innerText = details[id].title;

        // จุดที่แก้ไข: เปลี่ยน innerText เป็น innerHTML เพื่อให้แสดงผล Link ได้
        document.getElementById("modalText").innerHTML = details[id].text;

        // เช็คว่ามีรูปหรือไม่ ถ้าไม่มีให้ใช้ Placeholder
        let imgSrc = details[id].img;
        if (!imgSrc || imgSrc === "") {
          imgSrc = "https://via.placeholder.com/600x400?text=No+Image";
        }
        document.getElementById("modalImg").src = imgSrc;

        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("exerciseModal").style.display = "none";
        document.body.style.overflow = "auto";
      }

      window.onclick = function (event) {
        let modal = document.getElementById("exerciseModal");
        if (event.target == modal) {
          closeModal();
        }
      };
    </script>
  </body>
</html>
